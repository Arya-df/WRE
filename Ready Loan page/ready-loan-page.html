<body>

<div id="about-commercial"></div>
<div id="property-management-button"></div>
<div id="footer"></div>

<script>
    function loadHTML(id, file) {
  fetch(file)
    .then(res => res.text())
    .then(data => {
      document.getElementById(id).innerHTML = data;
    });
}

loadHTML("about-commercial", "about-commercial.html");
loadHTML("property-management-button", "../Property Management Page/property-management-button.html");
loadHTML("footer", "../home-page/Footer_1.html");
</script>
</body>
