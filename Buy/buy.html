<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="/assets/js/main.js" defer></script>
    <style>

    </style>
</head>
<body>

<div id="first-step"></div>
<div id="all-in"></div>
<div id="prepare"></div>
<div id="blog"></div>
<div id="connect"></div>
<div id="footer"></div>

<script>
    function loadHTML(id, file) {
        fetch(file)
            .then(res => {
                if (!res.ok) throw new Error(`Could not find ${file}`);
                return res.text();
            })
            .then(data => {
                document.getElementById(id).innerHTML = data;
            })
            .catch(err => console.error(err));
    }

    // These are in the same folder as your index.html
    loadHTML("first-step", "first-step.html");
    loadHTML("all-in", "all-in.html");
    loadHTML("prepare", "prepare.html");
    loadHTML("blog", "../Home-Page/blog-card.html");
    loadHTML("connect", "../Home-Page/connect.html");
    loadHTML("footer", "../Home-Page/Footer_1.html"); 
</script>


</body>
</html>
