<body>

<div id="office-search"></div>
<div id="office-card"></div>
<div id="connect"></div>
<div id="footer"></div>

<script>
    function loadHTML(id, file) {
  fetch(file)
    .then(res => res.text())
    .then(data => {
      document.getElementById(id).innerHTML = data;
    });
}

loadHTML("office-search", "searchoffice.html");
loadHTML("office-card", "office-card.html");
loadHTML("connect", "../Home-Page/connect.html");
loadHTML("footer", "../Home-Page/Footer_1.html");
</script>
</body>
